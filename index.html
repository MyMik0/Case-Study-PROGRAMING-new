<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geo-Curve Pro v9.8 (Interface v6.2 Edition)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<style>
    :root {
        --primary: #2c3e50;
        --secondary: #34495e;
        --accent: #27ae60;
        --danger: #e74c3c;
        --warning: #f39c12;
        --overlay: rgba(255, 255, 255, 0.95);
        --text-color: #2c3e50;
        --card-bg: #ffffff;
    }

    /* DARK MODE */
    body.dark-mode {
        --primary: #ecf0f1;
        --secondary: #bdc3c7;
        --accent: #2ecc71;
        --overlay: rgba(44, 62, 80, 0.95);
        --text-color: #ecf0f1;
        --card-bg: #34495e;
    }

    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        margin: 0; padding: 15px; 
        color: var(--text-color);
        background: url('209301.jpg') no-repeat center center fixed;
        background-size: cover;
        transition: 0.3s;
    }

    /* SIDEBAR */
    .sidebar {
        position: fixed; left: -300px; top: 0; width: 300px; height: 100%;
        background: var(--card-bg); color: var(--text-color);
        box-shadow: 5px 0 15px rgba(0,0,0,0.3);
        transition: 0.3s; z-index: 10000; padding: 20px; box-sizing: border-box; overflow-y: auto;
    }
    .sidebar.active { left: 0; }
    .sidebar-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.5); display: none; z-index: 9999;
    }
    .sidebar-overlay.active { display: block; }

    /* LAYOUT UTAMA v6.2 */
    .container { 
        max-width: 1000px; margin: auto; background: var(--overlay); 
        padding: 25px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        backdrop-filter: blur(5px);
    }

    #auth-container { display: flex; justify-content: center; align-items: center; min-height: 85vh; }
    .auth-card { 
        background: white; padding: 35px; border-radius: 10px; 
        box-shadow: 0 5px 20px rgba(0,0,0,0.2); text-align: center; width: 320px;
    }
    .auth-card input { margin-bottom: 12px; width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }

    .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    
    .grid-v62 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 768px) { .grid-v62 { grid-template-columns: 1fr; } }

    .card { background: var(--card-bg); border-radius: 8px; padding: 18px; border: 1px solid rgba(0,0,0,0.1); }
    
    label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 4px; color: var(--secondary); }
    input[type="number"], input[type="text"] { 
        width: 100%; padding: 8px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; 
    }
    .dms-group { display: flex; gap: 4px; margin-bottom: 12px; }
    .dms-group input { margin-bottom: 0; text-align: center; }

    button { 
        width: 100%; padding: 12px; border: none; border-radius: 5px; 
        color: white; background: var(--accent); cursor: pointer; font-weight: bold; text-transform: uppercase;
    }
    button:hover { opacity: 0.9; transform: scale(1.01); }

    .result-v62 { 
        background: #222; color: #00ff00; padding: 15px; border-radius: 5px;
        font-family: 'Courier New', Courier, monospace; font-size: 14px; line-height: 1.4;
        margin-top: 20px; white-space: pre-wrap; border-left: 5px solid var(--accent);
    }

    table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; color: #333; font-size: 12px; }
    th { background: #34495e; color: white; padding: 10px; text-align: center; }
    td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    tr:nth-child(even) { background: #f9f9f9; }

    canvas { background: #fff; border: 1px solid #ccc; border-radius: 5px; width: 100%; height: auto; }

    .footer-btns { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
    .btn-pdf { background: #2980b9; }
    .btn-apk { background: #f39c12; text-decoration: none; color: white; text-align: center; padding: 12px; border-radius: 5px; font-weight: bold; }

    /* Hide logic */
    [id="downloadArea"] { display: flex; }
</style>
</head>
<body>

<div id="sbOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
<div id="sbHistory" class="sidebar">
    <h3>📜 Sejarah Rekod</h3>
    <hr>
    <div id="historyList"></div>
    <button onclick="clearHistory()" style="background:var(--danger); margin-top:20px;">Kosongkan</button>
</div>

<div id="auth-container">
    <div class="auth-card">
        <h2 style="margin-top:0;">LOG MASUK</h2>
        <input type="text" id="login-user" placeholder="Username">
        <input type="password" id="login-pass" placeholder="Password">
        <button onclick="handleLogin()">Masuk</button>
    </div>
</div>

<div id="calculator-section" class="container" style="display:none;">
    <div class="header-nav">
        <div id="welcome-msg" style="font-weight:bold;">User: admin</div>
        <div style="display:flex; gap:5px;">
            <button onclick="toggleDarkMode()" style="width:auto; padding:5px 10px; background:var(--secondary);">🌓</button>
            <button onclick="toggleSidebar()" style="width:auto; padding:5px 10px; background:var(--primary);">📜 Sejarah</button>
            <button onclick="logout()" style="width:auto; padding:5px 10px; background:var(--danger);">X</button>
        </div>
    </div>

    <h2 style="text-align:center; margin-top:0; border-bottom: 2px solid var(--accent); padding-bottom:10px;">Geo-Curve Pro v6.2 Optimized</h2>

    <div class="grid-v62">
        <div class="card">
            <label>Nama Projek</label>
            <input type="text" id="rec_name" placeholder="Contoh: Jalan Bukit">
            
            <label>Chainage IP (m)</label>
            <input type="number" id="IP_chain" step="0.001">
            
            <label>Jejari R (m)</label>
            <input type="number" id="R" step="0.001">
            
            <label>Sudut Pesongan Δ (DMS)</label>
            <div class="dms-group">
                <input type="number" id="d_deg" placeholder="D">
                <input type="number" id="d_min" placeholder="M">
                <input type="number" id="d_sec" placeholder="S">
            </div>
            
            <label>Interval (m)</label>
            <input type="number" id="interval" value="20">
            
            <button onclick="kiraSemua()">PROSES KIRAAN</button>
        </div>

        <div class="card">
            <label style="text-align:center;">VISUALISASI LENGKUNG</label>
            <canvas id="curveCanvas" width="400" height="300"></canvas>
            <div id="result" class="result-v62">Menunggu input...</div>
        </div>
    </div>

    <div style="overflow-x:auto;">
        <table id="settingOutTable">
            <thead>
                <tr>
                    <th>POINT</th>
                    <th>CHAINAGE</th>
                    <th>CHORD</th>
                    <th>α (DMS)</th>
                    <th>δ (DMS)</th>
                    <th>2R Sin δ</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="footer-btns" id="downloadArea">
        <button class="btn-pdf" onclick="downloadPDF()">💾 SIMPAN SEBAGAI PDF</button>
        <a href="#" class="btn-apk">📲 MUAT TURUN APK</a>
    </div>
</div>

<script>
/* AUTO-HIDE DOWNLOAD DALAM APP */
function checkAppMode() {
    const isApp = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    if(isApp) document.getElementById('downloadArea').style.display = 'none';
}
window.onload = checkAppMode;

/* THEME & SIDEBAR */
function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('geoTheme', document.body.classList.contains('dark-mode'));
}
if(localStorage.getItem('geoTheme') === 'true') document.body.classList.add('dark-mode');

function toggleSidebar() {
    document.getElementById('sbHistory').classList.toggle('active');
    document.getElementById('sbOverlay').classList.toggle('active');
}

/* LOGIN */
function handleLogin() {
    const u = document.getElementById('login-user').value;
    const p = document.getElementById('login-pass').value;
    if(u === "admin1" && p === "123456") {
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('calculator-section').style.display = 'block';
        renderHistory();
    } else { alert("Salah!"); }
}
function logout() { location.reload(); }

/* CORE CALCULATION v6.2 */
function dmsToDec(d, m, s) { return (parseFloat(d)||0) + (parseFloat(m)||0)/60 + (parseFloat(s)||0)/3600; }
function decToDMS(dd) {
    const d = Math.floor(dd + 1e-9);
    const m_f = (dd - d) * 60;
    const m = Math.floor(m_f + 1e-9);
    const s = Math.round((m_f - m) * 60);
    return `${d}°${m}'${s}"`;
}

function kiraSemua() {
    const IP = parseFloat(document.getElementById("IP_chain").value);
    const R = parseFloat(document.getElementById("R").value);
    const Δ = dmsToDec(document.getElementById("d_deg").value, document.getElementById("d_min").value, document.getElementById("d_sec").value);
    const intv = parseFloat(document.getElementById("interval").value);

    if(!IP || !R || !Δ) return alert("Sila isi data!");

    const rad = Δ * Math.PI / 180;
    const T = R * Math.tan(rad / 2);
    const L = (Math.PI * R * Δ) / 180;
    const T1 = IP - T;
    const T2 = T1 + L;

    // Tampilkan Result Gaya v6.2
    document.getElementById("result").innerText = 
        `>>> GEOMETRI LENGKUNG <<<\n` +
        `TANGENT (T) : ${T.toFixed(3)} m\n` +
        `LENGTH (L)  : ${L.toFixed(3)} m\n` +
        `T1 (START)  : ${T1.toFixed(3)}\n` +
        `T2 (END)    : ${T2.toFixed(3)}`;

    // Generate Table
    let html = "";
    let curr = T1;
    let cumA = 0;

    // T1 Row
    html += `<tr><td>T1</td><td>${T1.toFixed(3)}</td><td>-</td><td>-</td><td>-</td><td>0.000</td></tr>`;

    // Intermediate Points
    let next = Math.ceil(T1 / intv) * intv;
    while(next < T2) {
        let chord = next - curr;
        let a = (1718.9 * chord / R) / 60;
        cumA += a;
        let lc = 2 * R * Math.sin(cumA * Math.PI / 180);
        html += `<tr><td>P</td><td>${next.toFixed(3)}</td><td>${chord.toFixed(3)}</td><td>${decToDMS(a)}</td><td>${decToDMS(cumA)}</td><td>${lc.toFixed(3)}</td></tr>`;
        curr = next;
        next += intv;
    }

    // T2 Row
    let finalChord = T2 - curr;
    let finalA = (1718.9 * finalChord / R) / 60;
    cumA += finalA;
    html += `<tr><td>T2</td><td>${T2.toFixed(3)}</td><td>${finalChord.toFixed(3)}</td><td>${decToDMS(finalA)}</td><td>${decToDMS(cumA)}</td><td>${(2*R*Math.sin(cumA*Math.PI/180)).toFixed(3)}</td></tr>`;

    document.getElementById("tableBody").innerHTML = html;

    // Lukis Canvas Minimalis
    const ctx = document.getElementById("curveCanvas").getContext("2d");
    ctx.clearRect(0,0,400,300);
    ctx.beginPath();
    ctx.strokeStyle = "#27ae60"; ctx.lineWidth = 3;
    ctx.arc(200, 250, 150, Math.PI + 0.5, Math.PI * 2 - 0.5);
    ctx.stroke();

    // Simpan Sejarah
    saveHistory(document.getElementById("rec_name").value || "Tanpa Nama", T1, T2, L);
}

/* HISTORY LOGIC */
function saveHistory(nama, t1, t2, l) {
    let logs = JSON.parse(localStorage.getItem('geoLogs') || "[]");
    logs.unshift({nama, t1: t1.toFixed(2), t2: t2.toFixed(2), l: l.toFixed(2), date: new Date().toLocaleDateString()});
    localStorage.setItem('geoLogs', JSON.stringify(logs.slice(0,10)));
    renderHistory();
}

function renderHistory() {
    let logs = JSON.parse(localStorage.getItem('geoLogs') || "[]");
    document.getElementById("historyList").innerHTML = logs.map(x => 
        `<div style="font-size:11px; padding:8px; border-bottom:1px solid #ddd;">
            <b>${x.nama}</b> (${x.date})<br>T1: ${x.t1} | T2: ${x.t2}
        </div>`).join("");
}

function clearHistory() { localStorage.removeItem('geoLogs'); renderHistory(); }

function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text("LAPORAN SETTING OUT LENGKUNG", 15, 15);
    doc.autoTable({ html: '#settingOutTable', startY: 25 });
    doc.save("Laporan_Geomatik.pdf");
}
</script>
</body>
</html>
