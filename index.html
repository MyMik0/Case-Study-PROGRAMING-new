<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo-Curve Pro Fix</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --overlay: rgba(255, 255, 255, 0.95); }
        
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px;
            background: url('https://images.unsplash.com/photo-1541888946425-d81bb19240f5?auto=format&fit=crop&q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
        }

        /* Memastikan Login hanya muncul satu di tengah */
        #login-container { 
            display: flex; justify-content: center; align-items: center; min-height: 90vh; 
        }

        .login-card { 
            background: var(--overlay); padding: 40px; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; width: 350px;
        }

        .main-container { 
            max-width: 1100px; margin: auto; background: var(--overlay); 
            padding: 30px; border-radius: 15px; display: none; /* Sembunyi asal */
        }

        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .result-box { background: #f9f9f9; border-left: 5px solid var(--accent); padding: 15px; margin-top: 10px; font-family: monospace; white-space: pre-wrap; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="login-card">
            <h2 style="color:var(--primary)">GEO-CURVE LOGIN</h2>
            <input type="text" id="user" placeholder="Admin Name">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="checkLogin()">Log Masuk</button>
        </div>
    </div>

    <div id="calculator-section" class="main-container">
        <h2 style="text-align:center">Professional Curve System</h2>
        
        <div class="grid">
            <div style="background:white; padding:20px; border-radius:10px;">
                <h3>Input Data</h3>
                <label>Chainage T1:</label> <input type="number" id="T1_chain" placeholder="2042.821">
                <label>Jejari R (m):</label> <input type="number" id="R" placeholder="600">
                <label>Sudut Δ (Deg Min Sec):</label>
                <div style="display:flex; gap:5px;">
                    <input type="number" id="d_deg" placeholder="Deg">
                    <input type="number" id="d_min" placeholder="Min">
                    <input type="number" id="d_sec" placeholder="Sec">
                </div>
                <button onclick="processKira()">Kira Sekarang</button>
            </div>
            
            <div style="background:white; padding:20px; border-radius:10px;">
                <h3>Hasil Pengiraan</h3>
                <div id="final-result" class="result-box">Keputusan akan dipaparkan di sini...</div>
            </div>
        </div>

        <button style="background:#3498db; margin-top:20px;" onclick="location.reload()">Log Keluar</button>
    </div>

    <script>
        function checkLogin() {
            const u = document.getElementById("user").value;
            const p = document.getElementById("pass").value;
            if(u === "admin1" && p === "123456") {
                document.getElementById("login-container").style.display = "none";
                document.getElementById("calculator-section").style.display = "block";
            } else {
                alert("Salah!");
            }
        }

        function processKira() {
            // Logik pengiraan anda di sini...
            const R = document.getElementById("R").value;
            document.getElementById("final-result").innerHTML = "L = ...\nT = ...\nLC = ...";
        }
    </script>
</body>
</html>
