<!DOCTYPE html>

<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Kalkulator Lengkung Geomatik</title>

<!-- PDF LIBRARY -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#f4f4f9; margin:20px;}
.container { max-width:700px; margin:auto; background:#fff; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
h2,h3 { text-align:center;}
.input-group { margin-bottom:10px;}
label { font-weight:bold;}
input { width:100%; padding:8px; margin-top:5px;}
button { width:100%; padding:10px; margin-top:10px; border:none; color:white; background:#28a745; cursor:pointer;}
button:hover { background:#218838;}
.result { background:#e9ecef; padding:10px; margin-top:15px;}
canvas { margin-top:20px; border:1px solid #ccc;}
table { width:100%; margin-top:15px; border-collapse:collapse;}
th,td { border:1px solid #ccc; padding:5px; text-align:center;}
#calculator { display:none;}
.formula { background:#fff3cd; padding:10px; margin-top:10px; border-left:5px solid #ffc107;}
</style>

</head>

<body>

<div class="container">

<!-- LOGIN -->

<div id="login">
<h3>Login Sistem</h3>
<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Masuk</button>
</div>

<!-- CALCULATOR -->

<div id="calculator">

<h2>Kalkulator Lengkung Bulat</h2>

<div class="input-group">
<label>Jejari R (m)</label>
<input type="number" id="R" placeholder="Contoh: 150">
</div>

<div class="input-group">
<label>Sudut Δ (degree)</label>
<input type="number" id="delta" placeholder="Contoh: 30">
</div>

<div class="input-group">
<label>Chord c (m)</label>
<input type="number" id="c" value="20">
</div>

<button onclick="kira()">Kira</button>

<!-- PAPAR RUMUS -->

<div class="formula">
<h4>Rumus Utama Digunakan:</h4>
<p><b>L = (π × R × Δ) / 180</b></p>
</div>

<div class="result" id="result"></div>

<canvas id="curveCanvas" width="500" height="300"></canvas>

<h3>Setting Out Table</h3>
<table id="table">
<tr><th>Station (m)</th><th>Deflection (°)</th></tr>
</table>

<button onclick="downloadPDF()">Download PDF</button> <button onclick="logout()" style="background:red;">Logout</button>

</div>
</div>

<script>

// LOGIN
function login(){
let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if(u==="admin1" && p==="123456"){
document.getElementById("login").style.display="none";
document.getElementById("calculator").style.display="block";
}else{
alert("Login gagal!");
}
}

// LOGOUT
function logout(){
location.reload();
}

// MAIN CALCULATION
function kira(){

let R = parseFloat(document.getElementById("R").value);
let d = parseFloat(document.getElementById("delta").value);
let c = parseFloat(document.getElementById("c").value);

if(isNaN(R) || isNaN(d)){
alert("Masukkan nilai yang betul!");
return;
}

let rad = d * Math.PI / 180;

// ===============================
// FORMULA ENGINEERING SURVEY
// ===============================

// RUMUS UTAMA:
// L = (π × R × Δ) / 180

let T = R * Math.tan(rad/2);
let L = Math.PI * R * d / 180; 
let LC = 2 * R * Math.sin(rad/2);
let E = R * (1/Math.cos(rad/2)-1);
let M = R * (1 - Math.cos(rad/2));
let theta = (180 * c)/(Math.PI * R);

// OUTPUT
document.getElementById("result").innerHTML = `
<b>Rumus:</b> L = (π × R × Δ) / 180 <br><br>

<b>Tangent (T):</b> ${T.toFixed(3)} m<br>
<b>Length (L):</b> ${L.toFixed(3)} m<br>
<b>Long Chord (LC):</b> ${LC.toFixed(3)} m<br>
<b>External (E):</b> ${E.toFixed(3)} m<br>
<b>Mid-ordinate (M):</b> ${M.toFixed(3)} m<br>
<b>Deflection (θ):</b> ${theta.toFixed(4)}°
`;

// DRAW CURVE
let canvas = document.getElementById("curveCanvas");
let ctx = canvas.getContext("2d");

ctx.clearRect(0,0,500,300);

// scale
let scale = 1;
if(R > 200) scale = 0.5;
if(R > 400) scale = 0.3;

ctx.beginPath();
ctx.arc(250,250,R*scale,Math.PI,Math.PI+rad);
ctx.stroke();

// TABLE
let table = document.getElementById("table");
table.innerHTML = "<tr><th>Station (m)</th><th>Deflection (°)</th></tr>";

let n = Math.floor(L/c);

for(let i=1;i<=n;i++){
let def = i * theta;
table.innerHTML += `<tr><td>${(i*c).toFixed(2)}</td><td>${def.toFixed(4)}</td></tr>`;
}

}

// PDF EXPORT
function downloadPDF(){
const { jsPDF } = window.jspdf;
let doc = new jsPDF();

doc.text("LAPORAN LENGKUNG GEOMATIK", 20,20);

let text = document.getElementById("result").innerText;
doc.text(text,20,40);

doc.save("lengkung_geomatik.pdf");
}

</script>

</body>
</html>
